# FZI Cartesian controllers -- shared "zero-gravity" / hold-pose preset.
#
# The orchestrator pre-loads three FZI controller plugins (all inactive)
# and switches whichever is currently selected with the JTC on engage.
# This file is loaded into controller_manager once for each spawner;
# controller_manager picks the section keyed by the controller's own
# node name.
#
# Conventions:
#   * end_effector_link / robot_base_link / ft_sensor_ref_link / joints
#     are identical across the three controllers and should match the
#     URDF that controller_manager sees.
#   * The KDL chain runs base_link -> link_1..link_6 -> ft_sensor_link
#     -> compliance_link (the latter two are aux frames declared in
#     ``robot_config.yaml::duco_robot_bringup.aux_frames`` and appended
#     to the URDF by ``duco_robot_bringup`` at bringup). With zero
#     offsets the tip pose is identical to link_6 -- so JTC behaviour
#     is unchanged -- but FZI's ``robotChainContains`` now accepts both
#     ``ft_sensor_link`` and ``compliance_link`` as ref links.
#   * pd_gains are deliberately conservative for first contact; tune
#     them at runtime via the dashboard or
#     ``ros2 param set /<controller_name> pd_gains.trans_x.p ...``.
#   * The compliance controller adds ``stiffness.*`` -- this is the
#     impedance the arm projects on its environment when an external
#     wrench is applied (units: N/m for trans_*, Nm/rad for rot_*).

# --- Force controller ----------------------------------------------------
# Minimises (target_wrench - ft_sensor_wrench).  With our orchestrator
# publishing target_wrench=0, this is pure free-drive (hand guidance).
#
# ``ft_sensor_ref_link`` is the URDF frame in which the FT measurement is
# expressed.  It must exist in the KDL chain seen by controller_manager;
# the ``ft_sensor_link`` aux frame is appended at bringup by
# ``duco_robot_bringup`` from ``robot_config.yaml::duco_robot_bringup.aux_frames``.
cartesian_force_controller:
  ros__parameters:
    end_effector_link: "compliance_link"
    robot_base_link: "base_link"
    ft_sensor_ref_link: "ft_sensor_link"
    joints:
      - arm_1_joint_1
      - arm_1_joint_2
      - arm_1_joint_3
      - arm_1_joint_4
      - arm_1_joint_5
      - arm_1_joint_6
    command_interfaces:
      - position
    solver:
      error_scale: 0.05      # integration step (s); FZI default 1.0
      iterations: 5
      publish_state_feedback: true
    pd_gains:
      trans_x: {p: 2.0}
      trans_y: {p: 2.0}
      trans_z: {p: 2.0}
      rot_x:   {p: 50.0}
      rot_y:   {p: 50.0}
      rot_z:   {p: 50.0}

# --- Motion controller ---------------------------------------------------
# Drives the end-effector toward target_frame (PoseStamped on
# /<controller>/target_frame).  On activate it snapshots the current
# pose, so without an external publisher it simply holds pose.
cartesian_motion_controller:
  ros__parameters:
    end_effector_link: "compliance_link"
    robot_base_link: "base_link"
    joints:
      - arm_1_joint_1
      - arm_1_joint_2
      - arm_1_joint_3
      - arm_1_joint_4
      - arm_1_joint_5
      - arm_1_joint_6
    command_interfaces:
      - position
    solver:
      error_scale: 1.0       # FZI default; 0.1 was visually stationary on real HW
      iterations: 5
      publish_state_feedback: true
    pd_gains:
      trans_x: {p: 1.0}
      trans_y: {p: 1.0}
      trans_z: {p: 1.0}
      rot_x:   {p: 0.5}
      rot_y:   {p: 0.5}
      rot_z:   {p: 0.5}

# --- Compliance controller ----------------------------------------------
# Combination of motion + force: drives toward target_frame while
# yielding to target_wrench.  ``stiffness`` is the apparent impedance of
# the end-effector in the ``compliance_ref_link`` frame -- with the aux
# ``compliance_link`` rigidly attached at the wrist, a downward push in
# tool-Z yields in tool-Z.  Conservative stiffness numbers; raise for
# stiffer "stay on the path" behaviour.
#
# Both ``ft_sensor_ref_link`` and ``compliance_ref_link`` resolve to aux
# frames declared in ``robot_config.yaml::duco_robot_bringup.aux_frames``
# and appended to the canonical URDF by ``duco_robot_bringup`` at
# bringup time.
cartesian_compliance_controller:
  ros__parameters:
    end_effector_link: "compliance_link"
    robot_base_link: "base_link"
    ft_sensor_ref_link: "ft_sensor_link"
    compliance_ref_link: "compliance_link"
    joints:
      - arm_1_joint_1
      - arm_1_joint_2
      - arm_1_joint_3
      - arm_1_joint_4
      - arm_1_joint_5
      - arm_1_joint_6
    command_interfaces:
      - position
    stiffness:               # w.r.t. compliance_ref_link
      trans_x: 200.0         # N/m
      trans_y: 200.0
      trans_z: 200.0
      rot_x:   10.0          # Nm/rad
      rot_y:   10.0
      rot_z:   10.0
    solver:
      error_scale: 0.1
      iterations: 5
      publish_state_feedback: true
    pd_gains:
      trans_x: {p: 0.05, d: 0.005}
      trans_y: {p: 0.05, d: 0.005}
      trans_z: {p: 0.05, d: 0.005}
      rot_x:   {p: 0.5}
      rot_y:   {p: 0.5}
      rot_z:   {p: 0.5}
