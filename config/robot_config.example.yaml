# duco_control project configuration template
#
# Copy this file to robot_config.yaml and edit with your local values.
# robot_config.yaml is gitignored (it can hold machine-specific IPs,
# device paths, and credentials).
#
#   cp config/robot_config.example.yaml config/robot_config.yaml
#   ${EDITOR:-nano} config/robot_config.yaml
#
# Convention: top-level keys are PACKAGE NAMES; second-level keys are
# the names the package's launch file exposes (i.e. they map 1-to-1 to
# `ros2 launch <pkg> <launch_file> <key>:=<value>`). New packages just
# add a new top-level section with their own keys.
#
# Strings may use ${ENV_VAR} expansion (e.g. ${HOME}). Values not set
# here fall back to whatever the consuming launch file defaults to.

version: "1.0"

# ============================================================================
# duco_ft_sensor (driver node for the 6-DoF F/T sensor)
# ============================================================================
duco_ft_sensor:
  port: "/dev/ttyUSB0"      # USB-serial device
  baud: 460800
  topic: "/duco_ft_sensor/wrench_raw"
  frame_id: "ft_sensor_link"
  publish_rate: 0.0         # 0 = publish every received frame (~960 Hz)
  autostart: true           # start streaming on launch
  tare_on_start: false      # software-tare against the first sample on startup

# ============================================================================
# ft_sensor_dashboard (web dashboard for any WrenchStamped topic)
# ============================================================================
ft_sensor_dashboard:
  topic: "/duco_ft_sensor/wrench_raw"  # which wrench topic to plot
  host: "0.0.0.0"           # 0.0.0.0 = LAN-visible, 127.0.0.1 = local-only
  port: 8080
  window_seconds: 10.0      # initial plot window
  push_rate: 30.0           # initial SSE update rate (Hz)
  reliability: "best_effort"  # match the publisher's QoS
  title: ""                 # optional extra label in the page title

# ============================================================================
# ft_sensor_gravity_compensation (compensated wrench publisher + dashboard)
# ============================================================================
ft_sensor_gravity_compensation:
  input_topic: "/duco_ft_sensor/wrench_raw"
  output_topic: "/duco_ft_sensor/wrench_compensated"
  world_frame: "base_link"        # gravity-fixed frame in /tf
  sensor_frame: "link_6"          # frame whose orientation is used for gravity
  reliability: "best_effort"      # match the publisher's QoS
  publish_when_no_tf: false       # if true, fall back to bias-only when TF stale
  storage_path: "~/.ros/ft_sensor_gravity_compensation/end_effectors.yaml"
  enable_dashboard: false         # set true to launch the calibration web UI
  host: "0.0.0.0"
  port: 8100
  gravity: 9.80665                # m/s^2
  tf_timeout: 0.05                # seconds, per lookup_transform call
  tf_max_age: 1.0                 # seconds; older TF -> stop publishing

# ============================================================================
# duco_cartesian_control (FZI orchestrator: engage UX + safety supervisor
# wrapping FZI's cartesian_force_controller; the C++ controller does the
# actual Cartesian admittance work in controller_manager).  System works
# end-to-end without any dashboard; cartesian_controller_dashboard below
# is a separate, optional UI.
# ============================================================================
duco_cartesian_control:
  # ---- connectivity ----
  wrench_topic: "/duco_ft_sensor/wrench_compensated"
  joint_states_topic: "/joint_states"
  controller_manager_ns: "/controller_manager"
  engaged_default: false          # do not auto-engage on launch
  # ---- FZI controller wiring ----
  fzi_controller_name:     "cartesian_force_controller"
  fzi_jtc_controller_name: "arm_1_controller"
  fzi_ft_topic:            "/cartesian_force_controller/ft_sensor_wrench"
  fzi_target_topic:        "/cartesian_force_controller/target_wrench"
  fzi_target_frame:        "link_6"
  fzi_target_rate_hz:      10.0
  fzi_service_timeout_sec: 2.0
  # ---- supervisor + state publish ----
  loop_rate_hz: 50.0              # safety-supervisor tick (not the FZI hot path)
  state_publish_rate_hz: 5.0      # rate the JSON state topic is heartbeated
  # ---- safety ----
  max_wrench_force: 80.0
  max_wrench_torque: 10.0
  engage_max_joint_velocity: 0.05 # rad/s; refuse engage above this
  ft_stale_after: 0.25
  joint_states_stale_after: 0.25

# ============================================================================
# cartesian_controller_dashboard (web UI for monitoring + parameter tuning).
# Pure UI: subscribes to duco_cartesian_control's state, calls its
# Trigger services, and reads/writes parameters on the FZI controller.
# ============================================================================
cartesian_controller_dashboard:
  orchestrator_ns:     "/duco_cartesian_control"
  controller_name:     "cartesian_force_controller"
  wrench_topic:        "/duco_ft_sensor/wrench_compensated"
  joint_states_topic:  "/joint_states"
  service_timeout_sec: 2.0
  host: "0.0.0.0"
  port: 8120

# ============================================================================
# duco_dashboard (robot state dashboard for ros2_control bringup)
# ============================================================================
duco_dashboard:
  host: "0.0.0.0"
  port: 8090
  joint_states_topic: "/joint_states"
  wrench_topic: "/duco_ft_sensor/wrench_raw"
  controller_state_topic: "/arm_1_controller/state"
  push_rate: 20.0
  stale_after: 1.0

# ============================================================================
# duco_robot_bringup (project wrapper for the submodule ros2_control stack)
# ============================================================================
duco_robot_bringup:
  robot_ip: "192.168.1.10"  # Duco robot controller IP
  robot_port: 7003          # Duco controller TCP port (Thrift RPC)
  use_fake_hardware: true   # true = mock_components, false = real DucoHardwareInterface
  use_rviz: true            # launch the MoveIt RViz UI
  db: false                 # mongo warehouse DB (off by default; can be huge)
  debug: false              # extra ros2_control / MoveIt verbosity
  publish_frequency: 15.0   # robot_state_publisher TF rate (Hz)
